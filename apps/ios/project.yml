name: SitewalkGallery
# Per-developer settings (PPQ_API_KEY, etc.) live in the gitignored
# project.local.yml, which ./generate.sh creates from project.local.yml.template
# and populates from the ANTHROPIC_API_KEY in the repo-root .env. Run
# ./generate.sh (not bare `xcodegen generate`) so the include below resolves.
include:
  - path: project.local.yml
options:
  bundleIdPrefix: com.damsac
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
packages:
  MurmurCoreFFI:
    path: Packages/MurmurCoreFFI
targets:
  SitewalkGallery:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: MurmurCoreFFI
    info:
      path: Sources/App/Info.plist
      properties:
        # Literal build-variable reference — the real value is a build setting
        # supplied by the gitignored project.local.yml and expanded by xcodebuild
        # into the built app's Info.plist. This tracked value never holds a secret.
        PPQ_API_KEY: "$(PPQ_API_KEY)"
        CFBundleDisplayName: Sitewalk
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: "Sitewalk records your walk-and-talk so it can turn it into paperwork."
        NSSpeechRecognitionUsageDescription: "Sitewalk transcribes your walk on-device to build your document."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - Barlow-Regular.ttf
          - Barlow-Medium.ttf
          - Barlow-SemiBold.ttf
          - Barlow-Bold.ttf
          - Barlow-ExtraBold.ttf
          - BarlowSemiCondensed-Medium.ttf
          - BarlowSemiCondensed-SemiBold.ttf
          - IBMPlexMono-Regular.ttf
          - IBMPlexMono-Medium.ttf
          - IBMPlexMono-SemiBold.ttf
          - SourceSerif4-SemiBold.ttf
          - SourceSerif4-Bold.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.damsac.sitewalk.gallery
        CODE_SIGNING_ALLOWED: "NO"
        TARGETED_DEVICE_FAMILY: "1"
